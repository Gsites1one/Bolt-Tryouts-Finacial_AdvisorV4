    <!-- Open Graph -->

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='40%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%233FE5BA'/%3E%3Cstop offset='60%25' stop-color='%230B4F4A'/%3E%3Cstop offset='100%25' stop-color='%23070A12'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='62%25' font-family='-apple-system,Segoe UI,Inter,sans-serif' font-size='18' font-weight='700' fill='%23FFFFFF' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />

    <!--
      Theme bootstrap — runs synchronously before any rendering to avoid a
      light→dark flash. Mirrors src/lib/theme.ts precedence:
        localStorage > prefers-color-scheme > 'light'.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aura-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          /* localStorage unavailable — fall through to default light */
        }
      })();
    </script>

    <link href="tailwind.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
